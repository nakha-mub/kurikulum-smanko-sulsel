<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengumuman Kelulusan</title>
  <style>
    /* 1. Kunci scroll pada seluruh halaman */
	  body { 
		font-family: 'Segoe UI', sans-serif; 
		padding: 20px; /* Kurangi sedikit padding agar di HP ada sisa ruang */
		background: url('assets/img/background.jpg') center/cover; 
		min-height: 100vh; 
		display: flex; 
		justify-content: center; 
		align-items: center; 
		overflow: hidden; /* Mencegah scroll pada body */
	  }

	  /* 2. Batasi tinggi card agar tidak meluap */
	  .card { 
		max-width: 500px; 
		width: 100%; 
		max-height: 90vh; /* Maksimal 90% tinggi layar */
		padding: 25px; 
		background: white; 
		border-radius: 20px; 
		box-shadow: 0 10px 30px rgba(0,0,0,0.1);
		display: flex;
		flex-direction: column; /* Agar isi card bisa diatur dengan flex */
		overflow: hidden; /* Sembunyikan konten yang meluap dari card */
	  }

	  /* 3. Sesuaikan elemen dalam card agar mengecil jika perlu */
	  .header-section { margin-bottom: 15px; padding-bottom: 15px; }
	  
	  .info-table { margin-bottom: 15px; }
	  .info-table td { padding: 6px 5px; }

	  /* Tambahan untuk HP: Jika layar sangat kecil, kecilkan logo dan foto */
	  @media (max-height: 600px) {
		.photo-container { width: 80px; height: 100px; }
		.logo-frame { width: 50px; height: 50px; }
		h2 { font-size: 1rem; }
		.card { padding: 15px; }
	  }

    /* Header Baru (Foto + Logo + Judul) */
    .header-section {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 15px;
        margin-bottom: 25px;
        padding-bottom: 20px;
        border-bottom: 2px solid #f0f0f0;
    }

    .photo-container {
        width: 100px;
        height: 130px;
        border: 2px solid #cbd5e1;
        border-radius: 8px;
        overflow: hidden;
        flex-shrink: 0;
    }
    .photo-container img { width: 100%; height: 100%; object-fit: cover; }

    .brand-section { display: flex; flex-direction: column; align-items: center; flex-grow: 1; }
    .logo-frame { 
		width: 60px;         /* Ukuran diameter lingkaran */
		height: 60px;        /* Ukuran diameter lingkaran */
		border-radius: 50%;   /* Membuat bulat sempurna */
		border: 2px solid #f0f0f0; /* Border tipis di luar */
		display: flex;
		justify-content: center;
		align-items: center;
		background-color: white;
		box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* Bayangan lembut */
		padding: 0px;        /* Jarak antara gambar dan border */
		margin-bottom: 10px; 
	}
    .logo-frame img { 
		width: 80%; 
		height: 80%; 
		object-fit: contain; 
	}
	
    h2 { font-size: 1.2rem; color: #1e3a8a; margin: 0; }
	h3 { font-size: 0.8rem; color: #1e3a8a; margin: 0; text-align: center; }

    /* Tabel & Button */
    .info-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .info-table td { padding: 8px 5px; font-size: 0.9rem; }
    .label { color: #64748b; font-weight: 500; width: 40%; }
    .value { color: #333; font-weight: 600; }
    .status-badge { display: block; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; }
    .lulus { background: #1e3a8a; color: white; }
    .tidak-lulus { background: #D40808; color: white; }
    .btn-group { display: flex; flex-direction: column; gap: 10px; }
    button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-download { background: #1e3a8a; color: white; }
    .btn-logout { background: #e5e7eb; color: #374151; }
  </style>
</head>
<body>

  <div class="card">
    <div class="header-section">
        <div class="photo-container">
            <img id="foto-siswa" src="assets/img/default-user.jpg" alt="Foto Siswa">
        </div>
        <div class="brand-section">
            <div class="logo-frame">
                <img src="assets/img/Logo SMANKO fix (bg putih).png" alt="Logo">
            </div>
            <h2>HASIL KELULUSAN PESERTA DIDIK</h2>
			<h3>SMAN KHUSUS KEBERBAKATAN OLAHRAGA <br>PROVINSI SULAWESI SELATAN</h3>
        </div>
    </div>
    
    <table class="info-table">
        <tr><td class="label">NAMA LENGKAP</td><td class="value" id="nama">-</td></tr>
        <tr><td class="label">NIS / NISN</td><td class="value" id="nisn">-</td></tr>
		<tr><td class="label">JENIS KELAMIN</td><td class="value" id="jk">-</td></tr>
        <tr><td class="label">KELAS</td><td class="value" id="kelas">-</td></tr>
        <tr><td class="label">CABANG OLAHRAGA</td><td class="value" id="cabor">-</td></tr>
    </table>

    <div id="status" class="status-badge">Memuat status...</div>

    <div class="btn-group">
      <!--<button class="btn-download" onclick="downloadPDF()">Download Sertifikat</button>-->
      <button class="btn-logout" onclick="logout()">KEMBALI</button>
    </div>
  </div>

  <script>
    const siswa = JSON.parse(localStorage.getItem("siswa"));
    if (!siswa) { window.location.href = "index.html"; } 
    else {
        document.getElementById("nama").innerText = siswa.nama;
        document.getElementById("nisn").innerText = `${siswa.nis} / ${siswa.nisn}`;
        document.getElementById("kelas").innerText = siswa.kelas;
        document.getElementById("cabor").innerText = siswa.cabor;
		document.getElementById("jk").innerText = (siswa.jk === "L") ? "LAKI-LAKI" : "PEREMPUAN";
		//document.getElementById("tpt_lahir").innerText = siswa.tpt_lahir+", "+siswa.tgl_lahir;
		//document.getElementById("tgl_lahir").innerText = siswa.tgl_lahir;
		//document.getElementById("nama_ortu").innerText = siswa.nama_ortu;
        
        const fotoEl = document.getElementById("foto-siswa");
        fotoEl.src = `assets/img/foto-siswa/${siswa.nisn}.jpg`;
        fotoEl.onerror = function() { this.src = "assets/img/default-user.jpg"; };
        
        const statusEl = document.getElementById("status");
        statusEl.innerText = `STATUS: ${siswa.status}`;
        statusEl.className = `status-badge ${siswa.status === "LULUS" ? "lulus" : "tidak-lulus"}`;
    }
    function logout() { localStorage.removeItem("siswa"); window.location.href = "index.html"; }
    function downloadPDF() { /* fungsi download tetap sama */ }
  </script>
</body>
</html>
