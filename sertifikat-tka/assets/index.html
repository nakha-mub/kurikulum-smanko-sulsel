<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akses Dilarang | SMANKO</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f8fafc;
      color: #1e293b;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 40px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
    }

    .icon-error {
      font-size: 80px;
      margin-bottom: 20px;
      color: #ef4444;
    }

    h1 { font-size: 2.5rem; margin-bottom: 10px; color: #1e3a8a; }
    p { color: #64748b; margin-bottom: 30px; line-height: 1.6; }

    .btn-home {
      display: inline-block;
      padding: 12px 30px;
      background: #1e3a8a;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.3s;
    }

    .btn-home:hover { background: #172554; }

    footer { margin-top: 30px; font-size: 0.8rem; color: #94a3b8; }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon-error">🚫</div>
    <h1>403 Forbidden</h1>
    <p>Maaf, Anda tidak memiliki izin untuk mengakses direktori ini. Direktori ini bukan untuk akses publik. Halaman ini hanya bisa diakses oleh admin dan dilindungi oleh sistem keamanan SMANKO SULSEL.</p>
    <a href="index.html" class="btn-home">Kembali ke Beranda</a>
    
    <footer>
      &copy; 2026 SMAN Khusus Keberbakatan Olahraga Sulsel
    </footer>
  </div>

</body>
</html>
